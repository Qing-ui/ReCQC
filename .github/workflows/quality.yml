name: Quality checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  repository-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install quality tools
        run: python -m pip install "ruff>=0.11,<1.0"
      - name: Validate repository structure and source syntax
        run: python -m unittest discover -s tests -v
      - name: Run static checks
        run: ruff check apps tests
      - name: Check formatting
        run: ruff format --check apps tests
